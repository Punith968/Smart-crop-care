name: farmer_crop_advisory
description: "A comprehensive farmer crop advisory mobile application built with Flutter."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Networking
  http: ^0.13.5
  dio: ^4.0.6

  # State Management
  provider: ^6.0.0
  flutter_riverpod: ^2.0.0

  # Local Storage
  shared_preferences: ^2.0.15
  hive: ^2.2.1
  hive_flutter: ^1.1.0

  # UI & Themes
  flutter_spinkit: ^5.1.0
  shimmer: ^2.0.0

  # Image Handling
  image_picker: ^0.8.5+1

  # URL Launcher
  url_launcher: ^6.1.14

  # Form Validation
  formz: ^0.4.1

  # Date & Time
  intl: ^0.18.0

  # Logging
  logger: ^1.1.0

  # Connectivity
  connectivity_plus: ^3.0.3

  # Navigation
  go_router: ^6.2.0

  # Environment Config
  flutter_dotenv: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  
  # Code Generation
  build_runner: ^2.4.6
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
